<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>스밍찍R</title>
  <meta name="description" content="음악 재생 화면을 간편하게 기록하고 스밍 인증 이미지를 만드는 Android 앱, 스밍찍R입니다.">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #202124;
      background: #f6f8fb;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      line-height: 1.6;
    }
    main {
      width: min(100%, 620px);
      padding: 48px;
      border: 1px solid #e1e5eb;
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 16px 40px rgb(32 33 36 / 8%);
    }
    h1 { margin: 0 0 12px; font-size: clamp(2rem, 7vw, 3.25rem); }
    p { margin: 0 0 28px; color: #5f6368; font-size: 1.08rem; }
    nav { display: flex; flex-wrap: wrap; gap: 12px; }
    a {
      padding: 11px 18px;
      border: 1px solid #d7dce3;
      border-radius: 10px;
      color: #1769e0;
      font-weight: 700;
      text-decoration: none;
    }
    a:first-child { border-color: #1769e0; color: #fff; background: #1769e0; }
    a:hover { filter: brightness(.94); }
    footer { margin-top: 36px; color: #80868b; font-size: .88rem; }
    @media (max-width: 520px) { main { padding: 32px 24px; } }
  </style>
</head>
<body>
  <main>
    <h1>스밍찍R</h1>
    <p>
      음악 재생 화면을 간편하게 기록하고 스밍 인증 이미지를 만들 수 있는
      Android 앱입니다.
    </p>
    <nav aria-label="관련 링크">
      <a href="https://play.google.com/store/apps/details?id=com.monpub.sming.redux">Google Play에서 보기</a>
      <a href="/privacy-policy.html">개인정보처리방침</a>
    </nav>
    <footer>© 2026 MonthlyPub</footer>
  </main>
</body>
</html>
